name: cron job
on:
  schedule:
    - cron: "* * * * *"

jobs:
  corn:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4 

    - name: install
      uses: actions/setup-python@v5 
      with: 
        python-version: '3.12' 

    - name: file_run
      run: python hello.py
